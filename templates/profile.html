{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2 class="text-center mb-3">Create an Account</h2>
        <form method="POST" action="{{ url_for('register') }}" enctype="multipart/form-data">
            <div class="grid">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control">
            </div>
            <div class="form-group">
                <label>Skills (e.g. Python, React)</label>
                <div class="tags-input-wrapper form-control" id="skills-wrapper">
                    <span id="tags-container"></span>
                    <input type="text" id="skill-input" placeholder="Type a skill and hit Enter or comma...">
                </div>
                <input type="hidden" name="skills" id="hidden-skills" value="">
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>LinkedIn URL</label>
                    <input type="url" name="linkedin" class="form-control">
                </div>
                <div class="form-group">
                    <label>GitHub URL</label>
                    <input type="url" name="github" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label>Education</label>
                <input type="text" name="education" class="form-control">
            </div>
            <div class="form-group">
                <label>Profile Photo</label>
                <input type="file" name="photo" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>
    </div>
</div>
<script>
    const skillInput = document.getElementById('skill-input');
    const hiddenSkills = document.getElementById('hidden-skills');
    const tagsContainer = document.getElementById('tags-container');
    const skillsWrapper = document.getElementById('skills-wrapper');

    let tags = hiddenSkills.value ? hiddenSkills.value.split(',').map(s => s.trim()).filter(s => s) : [];

    function updateTags() {
        tagsContainer.innerHTML = '';
        tags.forEach((tag, index) => {
            const span = document.createElement('span');
            span.className = 'tag-token';
            span.innerHTML = `${tag} <button type="button" onclick="removeTag(${index})">&times;</button>`;
            tagsContainer.appendChild(span);
        });
        hiddenSkills.value = tags.join(', ');
    }

    function removeTag(index) {
        tags.splice(index, 1);
        updateTags();
    }

    skillInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); 
        }
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            const value = skillInput.value.trim().replace(/,/g, '');
            if (value && !tags.includes(value)) {
                tags.push(value);
                skillInput.value = '';
                updateTags();
            }
        } else if (e.key === 'Backspace' && skillInput.value === '' && tags.length > 0) {
            tags.pop();
            updateTags();
        }
    });

    skillsWrapper.addEventListener('click', () => skillInput.focus());
    updateTags();
</script>
{% endblock %}
